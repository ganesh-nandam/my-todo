<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive To-Do List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass s-search"></i>
                <input type="text" placeholder="Search for any task you want...">
            </div>
            <div class="header-icons">
                <button class="icon-button">
                    <i class="fa-solid fa-bell"></i>
                    <span class="notification-dot"></span>
                </button>
                <button class="icon-button">
                    <i class="fa-solid fa-user"></i>
                </button>
            </div>
        </header>

        <div class="main-content">
            <div class="title-section">
                <div class="greeting" id="greeting">Good Morning</div>
                <h1>You have <span id="task-count" class="task-count">0</span> tasks today</h1>
                <button class="add-button" onclick="openModel()">
                    <i class="fa-solid fa-plus"></i> Add New
                </button>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2>On Hold / In Progress</h2>
                </div>
                <div id="onhold-tasks"></div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2>Completed</h2>
                    <span class="badge inactive" id="completed-badge">Done</span>
                </div>
                <div id="completed-tasks"></div>
            </div>
        </div>

        <aside class="sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-title">Result Summary</h3>
                
                <div class="stat-card">
                    <div class="stat-label">Completion Rate</div>
                    <div class="stat-value" id="completion-rate-value">0%</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="completion-progress" style="width: 0%;"></div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Total Progress</div>
                    <div class="stat-value" id="total-tasks">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Completed Tasks</div>
                    <div class="stat-value" id="completed-count">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Pending Tasks</div>
                    <div class="stat-value" id="pending-count">0</div>
                </div>
            </div>
        </aside>
    </div>

    <div class="modal" id="task-modal">
        <div class="modal-content">
            <div class="modal-header" id="modal-title">Add / Update Task</div>
            <form id="task-form">
                <div class="form-group">
                    <label>Task Title</label>
                    <input type="text" id="task-title-input" placeholder="Enter task title" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="task-status">
                        <option value="pending">Pending</option>
                        <option value="progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="task-priority">
                        <option value="minor">Minor</option>
                        <option value="normal">Normal</option>
                        <option value="critical">Critical</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="button button-secondary" onclick="closeModel()">
                        <i class="fa-solid fa-xmark"></i> Cancel
                    </button>
                    <button type="submit" class="button button-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
